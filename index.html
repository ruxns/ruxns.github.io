<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Specialist Bruno</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg1:#03050b;
      --bg2:#08111d;
      --bg3:#0c1627;
      --card:rgba(10,16,30,0.74);
      --line:rgba(0,255,195,0.14);
      --line-2:rgba(255,255,255,0.08);
      --text:#ecfffa;
      --muted:#9fc5bc;
      --neon:#00ffc3;
      --neon2:#00d9ff;
      --pink:#ff4fd8;
      --purple:#9d5cff;
      --green:#53ff83;
      --yellow:#ffe066;
      --shadow:0 0 30px rgba(0,255,195,0.12);
    }

    html{ scroll-behavior:smooth; }

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 10% 10%, rgba(0,255,195,0.08), transparent 25%),
        radial-gradient(circle at 90% 15%, rgba(0,217,255,0.10), transparent 25%),
        radial-gradient(circle at 80% 85%, rgba(157,92,255,0.10), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      position:relative;
    }

    .grid-bg{
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,255,195,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,195,0.045) 1px, transparent 1px);
      background-size:40px 40px;
      animation:gridMove 15s linear infinite;
      pointer-events:none;
      z-index:0;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0.25));
    }

    @keyframes gridMove{
      from{transform:translateY(0);}
      to{transform:translateY(40px);}
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:0.035;
      background-image:
        radial-gradient(circle at 25% 25%, #fff 0.6px, transparent 0.7px),
        radial-gradient(circle at 75% 45%, #fff 0.6px, transparent 0.7px),
        radial-gradient(circle at 35% 75%, #fff 0.6px, transparent 0.7px),
        radial-gradient(circle at 65% 15%, #fff 0.6px, transparent 0.7px);
      background-size:120px 120px;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(40px);
      pointer-events:none;
      z-index:0;
      opacity:0.16;
      animation:floatOrb 10s ease-in-out infinite alternate;
    }

    .orb1{
      width:240px;
      height:240px;
      background:var(--neon);
      top:40px;
      left:-60px;
    }

    .orb2{
      width:260px;
      height:260px;
      background:var(--neon2);
      right:-70px;
      bottom:80px;
      animation-duration:12s;
    }

    .orb3{
      width:180px;
      height:180px;
      background:var(--pink);
      top:48%;
      left:50%;
      transform:translateX(-50%);
      animation-duration:14s;
      opacity:0.10;
    }

    @keyframes floatOrb{
      from{transform:translateY(0) scale(1);}
      to{transform:translateY(35px) scale(1.08);}
    }

    #matrixCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      opacity:0.13;
      pointer-events:none;
    }

    .scanlines{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:0.08;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 2px,
          transparent 6px
        );
      animation:scanMove 7s linear infinite;
    }

    @keyframes scanMove{
      from{transform:translateY(0);}
      to{transform:translateY(24px);}
    }

    .container{
      width:min(1040px, 92%);
      margin:0 auto;
      position:relative;
      z-index:2;
      padding:26px 0 42px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(12,18,32,0.90), rgba(8,13,24,0.74));
      backdrop-filter:blur(16px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.28),
        0 0 0 1px rgba(255,255,255,0.02) inset,
        var(--shadow);
      padding:28px 24px 24px;
      margin-top:18px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(90deg,
          rgba(0,255,195,0.14),
          rgba(0,217,255,0.12),
          rgba(157,92,255,0.14),
          rgba(255,79,216,0.10)
        );
      filter:blur(28px);
      z-index:0;
      opacity:0.85;
    }

    .hero > *{ position:relative; z-index:1; }

    /* ===== HERO TITLE ONE LINE ===== */
    .title-row{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      width:100%;
    }

    .full-title{
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      font-size:clamp(1.08rem, 2.7vw, 2.2rem);
      line-height:1.2;
      white-space:nowrap;
      letter-spacing:1.2px;
      text-transform:uppercase;
      background:linear-gradient(
        90deg,
        #ffffff,
        var(--neon),
        var(--neon2),
        var(--purple),
        var(--pink),
        #ffffff
      );
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:rgbText 5.2s linear infinite;
      text-shadow:
        0 0 10px rgba(0,255,195,0.20),
        0 0 18px rgba(0,217,255,0.12),
        0 0 24px rgba(255,79,216,0.08);
      filter:drop-shadow(0 0 10px rgba(0,255,195,0.15));
    }

    @keyframes rgbText{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    .hero-line{
      width:min(700px, 100%);
      height:1px;
      margin:18px auto 0;
      background:linear-gradient(90deg, transparent, rgba(0,255,195,0.4), rgba(0,217,255,0.35), transparent);
      box-shadow:0 0 18px rgba(0,255,195,0.12);
    }

    .panel{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:24px;
      padding:22px;
      box-shadow:
        0 18px 55px rgba(0,0,0,0.24),
        0 0 0 1px rgba(255,255,255,0.02) inset,
        var(--shadow);
      backdrop-filter:blur(14px);
      margin-top:20px;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:auto auto -40px -40px;
      width:140px;
      height:140px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,255,195,0.12), transparent 70%);
      pointer-events:none;
    }

    .panel-title{
      font-family:"Orbitron", sans-serif;
      font-size:1rem;
      font-weight:800;
      letter-spacing:1px;
      margin-bottom:16px;
      display:flex;
      align-items:center;
      gap:12px;
      color:#f3fffb;
      text-transform:uppercase;
    }

    .panel-title i{
      color:var(--neon);
      font-size:1rem;
      filter:drop-shadow(0 0 8px rgba(0,255,195,0.35));
    }

    .social-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      max-width:700px;
      margin:0 auto;
    }

    .social-btn{
      position:relative;
      overflow:hidden;
      text-decoration:none;
      color:var(--text);
      border:1px solid var(--line-2);
      background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
      border-radius:18px;
      padding:17px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      min-height:68px;
      transition:0.25s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .social-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
      transform:translateX(-100%);
      transition:0.5s ease;
    }

    .social-btn:hover::before{ transform:translateX(100%); }

    .social-btn:hover{
      transform:translateY(-4px);
      border-color:rgba(0,255,195,0.25);
      box-shadow:0 0 24px rgba(0,255,195,0.12);
      background:linear-gradient(180deg, rgba(0,255,195,0.08), rgba(255,255,255,0.03));
    }

    .social-btn i{
      font-size:1.4rem;
      color:var(--neon);
      width:28px;
      text-align:center;
      filter:drop-shadow(0 0 8px rgba(0,255,195,0.35));
    }

    .social-btn span{
      font-weight:700;
      font-size:15px;
      letter-spacing:.2px;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:4px;
    }

    .full{ grid-column:1 / -1; }

    .input-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:13.5px;
      color:#dffef4;
      font-weight:700;
      letter-spacing:.25px;
    }

    input, select, textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:15px 16px;
      background:rgba(255,255,255,0.038);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--text);
      font-size:15px;
      transition:0.22s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
    }

    input::placeholder, textarea::placeholder{
      color:#89aea5;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(0,255,195,0.42);
      box-shadow:0 0 0 4px rgba(0,255,195,0.08), 0 0 20px rgba(0,255,195,0.06);
      background:rgba(255,255,255,0.055);
    }

    select option{
      background:#0e1728;
      color:#ecfffa;
    }

    textarea{
      min-height:185px;
      resize:vertical;
      line-height:1.65;
    }

    .helper{
      color:var(--muted);
      font-size:13px;
      line-height:1.65;
      margin-top:6px;
    }

    .submit-btn{
      position:relative;
      overflow:hidden;
      border:none;
      outline:none;
      padding:16px 20px;
      border-radius:18px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#07130f;
      background:linear-gradient(
        90deg,
        #00ffc3,
        #00d9ff,
        #9d5cff,
        #ff4fd8,
        #ffe066,
        #53ff83,
        #00ffc3
      );
      background-size:300% 100%;
      animation:buttonFlow 5s linear infinite;
      transition:0.25s ease;
      box-shadow:
        0 14px 30px rgba(0,255,195,0.18),
        0 0 18px rgba(0,255,195,0.12);
    }

    .submit-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transform:translateX(-100%);
      transition:0.6s ease;
    }

    .submit-btn:hover::before{
      transform:translateX(100%);
    }

    @keyframes buttonFlow{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    .submit-btn:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:
        0 18px 34px rgba(0,255,195,0.22),
        0 0 22px rgba(0,255,195,0.16);
    }

    .submit-btn i{ margin-right:8px; }

    /* ===== FOOTER MULTI COLOR ===== */
    .footer{
      margin-top:18px;
      padding:10px 2px 0;
      text-align:center;
      font-size:13px;
      letter-spacing:.45px;
    }

    .footer-rainbow{
      display:inline-block;
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      text-transform:uppercase;
      background:linear-gradient(
        90deg,
        #ff3cac 0%,
        #784ba0 12%,
        #2b86c5 24%,
        #00ffc3 36%,
        #ffe066 48%,
        #53ff83 60%,
        #ff4fd8 72%,
        #00d9ff 84%,
        #ffffff 100%
      );
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:footerFlow 6s linear infinite alternate;
      text-shadow:
        0 0 8px rgba(255,255,255,0.10),
        0 0 14px rgba(0,217,255,0.10),
        0 0 18px rgba(255,79,216,0.08);
    }

    @keyframes footerFlow{
      0%{
        background-position:0% 50%;
        filter:drop-shadow(-8px 0 8px rgba(255,79,216,0.10));
      }
      50%{
        background-position:100% 50%;
        filter:drop-shadow(8px 0 10px rgba(0,255,195,0.12));
      }
      100%{
        background-position:0% 50%;
        filter:drop-shadow(-8px 0 8px rgba(0,217,255,0.10));
      }
    }

    @media (max-width: 820px){
      form{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){
      .hero{
        padding:24px 16px 20px;
        border-radius:22px;
      }

      .panel{
        padding:18px;
        border-radius:20px;
      }

      .social-grid{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .social-btn{
        min-height:62px;
        padding:14px 10px;
      }

      .social-btn span{
        font-size:14px;
      }

      .full-title{
        font-size:clamp(0.94rem, 4.2vw, 1.35rem);
      }
    }
  </style>
</head>

  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>/{}[]";
    const fontSize = 16;
    let columns = Math.floor(window.innerWidth / fontSize);
    let drops = Array(columns).fill(1);

    function resetMatrix(){
      columns = Math.floor(window.innerWidth / fontSize);
      drops = Array(columns).fill(1);
    }
    window.addEventListener("resize", resetMatrix);

    function drawMatrix(){
      ctx.fillStyle = "rgba(3, 5, 11, 0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < drops.length; i++){
        const char = chars.charAt(Math.floor(Math.random() * chars.length));
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillStyle = "#00ffc3";
        ctx.font = fontSize + "px monospace";
        ctx.fillText(char, x, y);

        ctx.fillStyle = "rgba(0,255,195,0.12)";
        ctx.fillRect(x, y - fontSize * 2, 2, fontSize * 2);

        if(y > canvas.height && Math.random() > 0.975){
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 42);

    const form = document.getElementById("supportForm");
    const whatsappNumber = "8801347344027";

    form.addEventListener("submit", function(e){
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const service = document.getElementById("service").value;
      const problem = document.getElementById("problem").value.trim();

      if(!service || !problem){
        alert("Please select a service and write your problem.");
        return;
      }

      const finalName = name ? name : "Not Provided";

      const message =
`Hello Bruno,

New Support Request

Name: ${finalName}
Service: ${service}

Problem:
${problem}`;

      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;

      window.open(whatsappURL, "_blank");
    });
  </script>
